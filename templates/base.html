{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav>
      <div class="logo">BlogSpace</div>

      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Blogs</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">About</a></li>
      </ul>

      {% if request.user.is_authenticated %}
      <div class="profile">
        <img src="{{profile.profile_pic.url}}" alt="profile" />
        <div class="dropdown">
          <a href="#">Profile</a>
          <a href="#">My Blogs</a>
          <a href="#">Settings</a>
          <a href="#">Logout</a>
        </div>
      </div>
      {% else %}
      <a href="#" class="nav-btn">Login</a>
      {% endif %}
    </nav>
    {% block body %}{% endblock %}

    <!-- FOOTER -->

    <footer>© 2026 BlogSpace. All rights reserved.</footer>
  </body>
</html>
